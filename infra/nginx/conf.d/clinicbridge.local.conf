# ClinicBridge backend/API — reverse proxy (LOCAL/STAGING only).
# Since Sprint 3.10 the backend runs as the compose service `backend` on the same
# Docker network, so Nginx proxies to backend:3001 (no host.docker.internal needed).
# Host-run fallback: set $cb_backend to "host.docker.internal:3001" instead.
# Frontend via Nginx is a future sprint.

server {
    listen 80;
    server_name localhost clinicbridge.local;

    # >= UPLOAD_MAX_BYTES (5 MB). Uploads above this get 413 at the edge.
    client_max_body_size 10m;

    # Proxy timeouts: enough for a CSV/XLSX upload, not wide open (anti-slowloris).
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Docker's embedded DNS. Resolving the service name at RUNTIME (via a variable
    # below) means Nginx still starts when the backend container isn't up yet
    # (returns 502 until ready) instead of failing config load. ipv6=off avoids
    # the AAAA path that is unreachable in this setup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        # Compose service name. Host-run fallback: "host.docker.internal:3001".
        set $cb_backend "backend:3001";
        proxy_pass http://$cb_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        # Edge proxy facing untrusted clients: OVERWRITE forwarded headers with the
        # real connecting IP so a client-supplied X-Forwarded-For cannot spoof
        # req.ip. With Express TRUST_PROXY=1, req.ip becomes this value (used by
        # rate limiting and audit_logs). If another trusted proxy is ever placed
        # in FRONT of this Nginx, switch to $proxy_add_x_forwarded_for and bump
        # TRUST_PROXY to the real hop count.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # CORS stays in the app (FRONTEND_ORIGIN allowlist). Nginx does NOT emit
        # CORS headers here to avoid duplicate/conflicting Access-Control-* values.
    }
}
