# ClinicBridge backend/API — reverse proxy (LOCAL/STAGING only).
# Sprint 3.10: proxies to the compose service backend:3001.
# Sprint 3.11: TLS termination + HTTP->HTTPS redirect with a SELF-SIGNED local
#   cert (generate via scripts/generate-local-nginx-cert.sh; certs are gitignored).
#   NO real domain, NO real/managed cert, NO WAF. Host-run fallback: set
#   $cb_backend to "host.docker.internal:3001".

# --- HTTP (:80) — redirect everything to HTTPS ------------------------------
server {
    listen 80;
    server_name localhost clinicbridge.local;

    # 301 to the host-visible HTTPS port. The default compose mapping is
    # 127.0.0.1:8443 -> container :443, so we send the browser/curl to :8443.
    # If you change NGINX_HTTPS_PORT, update the :8443 here too.
    return 301 https://$host:8443$request_uri;
}

# --- HTTPS (:443) — terminate TLS and proxy to the backend ------------------
server {
    listen 443 ssl;
    server_name localhost clinicbridge.local;

    # Self-signed LOCAL/STAGING cert (mounted read-only by docker-compose from
    # infra/nginx/certs/local). Production uses a REAL cert (ACME / managed).
    ssl_certificate     /etc/nginx/certs/clinicbridge.local.crt;
    ssl_certificate_key /etc/nginx/certs/clinicbridge.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 10m;

    # >= UPLOAD_MAX_BYTES (5 MB). Uploads above this get 413 at the edge.
    client_max_body_size 10m;

    # Proxy timeouts: enough for a CSV/XLSX upload, not wide open (anti-slowloris).
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # HSTS: intentionally DISABLED for local/staging. Turning it on for localhost
    # pins the browser to HTTPS for ALL localhost apps (and a self-signed cert
    # makes that painful). Enable ONLY with a real, stable HTTPS production setup:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker embedded DNS; resolve the service name at runtime so Nginx still
    # starts when the backend container isn't up yet. ipv6=off avoids the
    # unreachable AAAA path in this setup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        # Compose service name. Host-run fallback: "host.docker.internal:3001".
        set $cb_backend "backend:3001";
        proxy_pass http://$cb_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        # Edge proxy facing untrusted clients: OVERWRITE forwarded headers with the
        # real connecting IP so a client-supplied X-Forwarded-For cannot spoof
        # req.ip. With Express TRUST_PROXY=1, req.ip becomes this value.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        # https when the request arrived over TLS (this :443 server). Lets the app
        # know the original scheme behind the proxy.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # CORS stays in the app (FRONTEND_ORIGIN allowlist). Nginx does NOT emit
        # CORS headers here to avoid duplicate/conflicting Access-Control-* values.
    }
}
