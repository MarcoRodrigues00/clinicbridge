# ClinicBridge — Nginx reverse proxy (LOCAL/STAGING only, Sprint 3.9).
# NO TLS, NO domain, NO WAF/ModSecurity here. TLS terminates at Nginx only in
# production (future). See docs/nginx-local-staging-runbook.md and ADR 0005.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Safe access log: connecting IP, the inbound (client-supplied) XFF for
    # debugging, method + NORMALIZED path (NO query string, NO request body),
    # status, bytes and time. NEVER logs Authorization or Cookie headers.
    log_format clinicbridge_safe
        '$remote_addr fwd="$http_x_forwarded_for" '
        '"$request_method $uri" $status '
        'bytes=$body_bytes_sent rt=$request_time';

    access_log /var/log/nginx/access.log clinicbridge_safe;
    error_log  /var/log/nginx/error.log warn;

    sendfile          on;
    tcp_nopush        on;
    keepalive_timeout 65;

    # Don't advertise the nginx version in error pages / Server header.
    server_tokens off;

    # Edge body-size ceiling aligned with UPLOAD_MAX_BYTES (5 MB default) + margin
    # so legitimate CSV/XLSX uploads pass. JSON stays capped at 100kb by Express.
    client_max_body_size 10m;

    # --- Upstream-HTTPS-edge detection (Cloudflare Tunnel; LOCAL/STAGING) -------
    # With `cloudflared tunnel --url http://localhost:8080`, the public hop is
    # HTTPS at Cloudflare but the hop into Nginx is plain HTTP on :80. Cloudflare
    # sets CF-Visitor: {"scheme":"https"} and X-Forwarded-Proto: https. We use
    # these to (a) tell the app the true client scheme and (b) AVOID the local
    # HTTP->:8443 redirect, which has no listener on the public tunnel host and
    # would loop forever. Trusting these client headers is acceptable ONLY because
    # this edge is LOCAL/STAGING and bound to 127.0.0.1 — it is NOT a production
    # trust boundary (production terminates real TLS and uses a real edge).
    map $http_cf_visitor $cb_cf_scheme {
        default                 "";
        "~\"scheme\":\"https\"" "https";
    }
    # Prefer an explicit X-Forwarded-Proto; else fall back to the CF-Visitor scheme.
    map $http_x_forwarded_proto $cb_edge_proto_raw {
        default  $cb_cf_scheme;
        "~."     $http_x_forwarded_proto;
    }
    # Neither header present → use the real local connection scheme (http on :80).
    map $cb_edge_proto_raw $cb_edge_proto {
        default $cb_edge_proto_raw;
        ""      $scheme;
    }
    # 1 when the client-facing scheme is HTTPS (upstream edge), 0 otherwise.
    map $cb_edge_proto $cb_edge_https {
        default 0;
        https   1;
    }

    include /etc/nginx/conf.d/*.conf;
}
