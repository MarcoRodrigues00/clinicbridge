# ClinicBridge — local infrastructure.
# PostgreSQL (always) + Redis (optional, for shared rate-limit store — Sprint 3.2).

services:
  postgres:
    image: postgres:15-alpine
    container_name: clinicbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinicbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
      POSTGRES_DB: ${POSTGRES_DB:-clinicbridge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - clinicbridge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinicbridge} -d ${POSTGRES_DB:-clinicbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — OPTIONAL shared store for rate limiting (Sprint 3.2).
  # Only needed when the backend runs with RATE_LIMIT_STORE=redis. In the default
  # local setup (RATE_LIMIT_STORE=memory) the backend ignores Redis entirely, so
  # this service is safe to leave running or stopped. Bound to 127.0.0.1 so it is
  # not exposed beyond the host. Future async parsing (BullMQ) can reuse it.
  redis:
    image: redis:7-alpine
    container_name: clinicbridge-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API — OPTIONAL, LOCAL/STAGING only (Sprint 3.10). Containerized so the
  # Nginx container can proxy to it over the compose network, resolving the
  # host-run WSL2 limitation from Sprint 3.9. Opt-in via the "edge" profile; built
  # from backend/Dockerfile with the repo ROOT as build context. NO real secrets:
  # the JWT_SECRET below is a LOCAL/STAGING placeholder; production uses a real one.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: clinicbridge-backend:local
    container_name: clinicbridge-backend
    profiles: ["edge"]
    restart: unless-stopped
    environment:
      # development keeps the production placeholder guards off so the container can
      # use the dev Postgres password. Production uses NODE_ENV=production + real
      # secrets (see docs/deploy-security-checklist.md).
      NODE_ENV: development
      BACKEND_PORT: "3001"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinicbridge}:${POSTGRES_PASSWORD:-change-me-locally}@postgres:5432/${POSTGRES_DB:-clinicbridge}"
      JWT_SECRET: "${BACKEND_JWT_SECRET:-local-staging-placeholder-not-a-real-secret-0123456789}"
      TRUST_PROXY: "1"
      RATE_LIMIT_STORE: "redis"
      REDIS_URL: "redis://redis:6379"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:5173}"
      ALLOW_DEMO_LOGIN: "true"
    # Not published to the host — Nginx is the entry point. (For debug you could add
    # a 127.0.0.1-bound port mapping, but keep the backend private by default.)
    expose:
      - "3001"
    volumes:
      # Persist uploads across restarts. Host dir is gitignored; the image's node
      # user (uid 1000) matches the host user, so the bind mount stays writable.
      # Production uses external/persistent storage.
      - ./storage/uploads:/repo/backend/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx reverse proxy — OPTIONAL, LOCAL/STAGING only (Sprint 3.9 / 3.10 / 3.11).
  # Opt-in via the "edge" profile so a plain `docker compose up -d` never starts
  # it: `docker compose --profile edge up -d nginx`. Proxies to the containerized
  # `backend` service over the compose network (backend:3001). Bound to 127.0.0.1.
  # Sprint 3.11: terminates TLS with a SELF-SIGNED LOCAL cert + redirects HTTP to
  # HTTPS. NO real domain, NO real/managed cert, NO WAF (those are future).
  # IMPORTANT: generate the local cert BEFORE `up`, or Nginx fails to start:
  #   ./scripts/generate-local-nginx-cert.sh
  # Config + details: infra/nginx/ and docs/nginx-local-staging-runbook.md.
  nginx:
    image: nginx:alpine
    container_name: clinicbridge-nginx
    profiles: ["edge"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
      - "127.0.0.1:${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Self-signed LOCAL/STAGING certs (gitignored). Run the generator first.
      - ./infra/nginx/certs/local:/etc/nginx/certs:ro
    extra_hosts:
      # Kept for the host-run backend fallback (host.docker.internal upstream).
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - backend

volumes:
  clinicbridge_postgres_data:
    name: clinicbridge_postgres_data
